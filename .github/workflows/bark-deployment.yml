name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'docs/**'
      - '.github/workflows/bark-deployment.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Build Bark documentation site
      run: |
        dotnet publish Bark/src/Bark/Bark.csproj -c Release -o ${{ github.workspace }}/publish

    - name: Generate static site
      run: |
        ${{ github.workspace }}/publish/Bark --export ${{ github.workspace }}/site --base-url https://melosso.github.io --base-path /bark

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '${{ github.workspace }}/site'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4